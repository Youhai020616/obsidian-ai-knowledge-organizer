name: Bug report
description: Report a reproducible AI Knowledge Organizer issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include private note content, API keys, or access tokens. Reproduce with a copied vault or `.tmp/beta-vault` whenever possible.
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.7.2"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Windows
        - Linux
        - iOS
        - Android
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider mode
      options:
        - Local heuristic
        - OpenAI
        - Anthropic
        - Gemini
        - Ollama
    validations:
      required: true
  - type: dropdown
    id: workflow
    attributes:
      label: Affected workflow
      options:
        - Analyze active note
        - Scan inbox
        - Apply proposal
        - Rollback proposal
        - Ask Vault
        - Vault audit
        - Governance proposals
        - URL import
        - File/PDF import
        - Settings
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use non-private sample notes or `.tmp/beta-vault`.
      placeholder: |
        1. Open ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: audit-log
    attributes:
      label: Relevant plugin audit log message
      description: Paste only non-sensitive messages from the plugin panel.
